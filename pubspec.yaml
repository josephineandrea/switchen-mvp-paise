name: switchen
description: "Switchen - Marketplace surplus makanan F&B Bandung untuk mengurangi food waste"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Navigation
  go_router: ^14.2.7

  # Supabase
  supabase_flutter: ^2.5.6

  # Functional Programming (Either)
  dartz: ^0.10.1

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Payment (Midtrans via WebView)
  webview_flutter: ^4.9.0

  # Firebase & Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Network & Caching
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.5

  # Image & File
  image_picker: ^1.1.2

  # UI & Animations
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  # Utils
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

  # Error Monitoring
  sentry_flutter: ^9.19.0

  # Google Fonts
  google_fonts: ^6.2.1

  # OTP Input
  pinput: ^5.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env
